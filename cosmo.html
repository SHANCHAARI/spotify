<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>COSMO — Your Music Universe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --c1: #0a0a1a;
    --c2: #1a1a3a;
    --acc: #7f77dd;
    --acc2: #5dcaa5;
    --acc3: #ef9f27;
    --text: #f0eeff;
    --muted: rgba(240,238,255,0.45);
    --card: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
    --glow: rgba(127,119,221,0.35);
    --radius: 20px;
    --transition: cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--c1);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
    touch-action: none;
    user-select: none;
  }

  /* ===== CANVAS LAYER ===== */
  #cosmos-canvas {
    position: fixed;
    inset: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  /* ===== SHOCKWAVE LAYER ===== */
  #shockwave-layer {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    overflow: hidden;
  }

  .shockwave {
    position: absolute;
    border-radius: 50%;
    border: 2px solid var(--acc);
    transform: translate(-50%, -50%) scale(0);
    opacity: 1;
    animation: shockwave-out 1.2s cubic-bezier(0.2, 0, 0.8, 1) forwards;
  }
  @keyframes shockwave-out {
    to { transform: translate(-50%, -50%) scale(6); opacity: 0; }
  }

  .supernova {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, var(--acc) 0%, transparent 70%);
    transform: translate(-50%, -50%) scale(0);
    opacity: 0.8;
    animation: supernova-burst 0.9s cubic-bezier(0.2, 0, 0.6, 1) forwards;
  }
  @keyframes supernova-burst {
    40% { transform: translate(-50%, -50%) scale(2.5); opacity: 0.6; }
    100% { transform: translate(-50%, -50%) scale(5); opacity: 0; }
  }

  /* ===== MAIN LAYOUT ===== */
  #app {
    position: fixed;
    inset: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow: hidden;
  }

  /* ===== AUTH SCREEN ===== */
  #auth-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
    text-align: center;
    animation: fadeUp 0.8s var(--transition) both;
  }

  .logo-mark {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(72px, 18vw, 120px);
    letter-spacing: 0.12em;
    line-height: 1;
    background: linear-gradient(135deg, var(--acc) 0%, var(--acc2) 50%, var(--acc3) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 40px var(--glow));
  }

  .logo-sub {
    font-size: 13px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: -20px;
  }

  .auth-tagline {
    font-size: clamp(16px, 4vw, 20px);
    font-weight: 300;
    color: var(--muted);
    line-height: 1.6;
    max-width: 320px;
  }

  .btn-spotify {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 18px 36px;
    background: #1DB954;
    border: none;
    border-radius: 100px;
    color: #000;
    font-family: 'DM Sans', sans-serif;
    font-size: 17px;
    font-weight: 500;
    cursor: pointer;
    transition: transform 0.2s var(--transition), box-shadow 0.3s ease;
    box-shadow: 0 0 40px rgba(29,185,84,0.3), 0 8px 32px rgba(0,0,0,0.4);
    -webkit-tap-highlight-color: transparent;
  }
  .btn-spotify:active { transform: scale(0.95); }
  .btn-spotify:hover { box-shadow: 0 0 60px rgba(29,185,84,0.5), 0 8px 40px rgba(0,0,0,0.5); transform: scale(1.03); }

  .spotify-icon {
    width: 26px; height: 26px;
    flex-shrink: 0;
  }

  .auth-note {
    font-size: 12px;
    color: var(--muted);
    opacity: 0.6;
    letter-spacing: 0.02em;
  }

  /* ===== PLAYER SCREEN ===== */
  #player-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 420px;
    gap: 0;
    position: relative;
  }

  /* ===== PLANET SYSTEM ===== */
  #planet-system {
    position: relative;
    width: 280px;
    height: 280px;
    margin: 0 auto;
    flex-shrink: 0;
  }

  #planet-ring-orbit {
    position: absolute;
    inset: -40px;
    border-radius: 50%;
    animation: orbit-spin 8s linear infinite;
  }

  @keyframes orbit-spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  #moon {
    position: absolute;
    top: 50%;
    left: -14px;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fff 0%, var(--acc2) 40%, #0a2a20 100%);
    box-shadow: 0 0 20px var(--acc2), 0 0 6px #fff inset;
    transform: translateY(-50%);
    transition: background 1.5s ease, box-shadow 1.5s ease;
  }

  #planet-wrap {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    overflow: hidden;
    cursor: pointer;
  }

  #planet-art {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 50%;
    transition: opacity 0.8s ease;
  }

  #planet-overlay {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 25%, rgba(255,255,255,0.08) 0%, transparent 60%),
                radial-gradient(circle at 75% 80%, rgba(0,0,0,0.5) 0%, transparent 50%);
    pointer-events: none;
  }

  #planet-ring {
    position: absolute;
    inset: -28px;
    border-radius: 50%;
    border: 3px solid var(--acc);
    box-shadow: 0 0 20px var(--glow), 0 0 60px var(--glow);
    pointer-events: none;
    transition: border-color 1.5s ease, box-shadow 1.5s ease;
    animation: ring-breathe 3s ease-in-out infinite;
  }

  @keyframes ring-breathe {
    0%, 100% { transform: scaleX(1.18) scaleY(0.28) translateY(140px); opacity: 0.7; }
    50% { transform: scaleX(1.22) scaleY(0.30) translateY(145px); opacity: 1; }
  }

  #planet-pulse {
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 1.5px solid var(--acc);
    opacity: 0;
    pointer-events: none;
  }

  /* ===== BEAT VISUALIZER ===== */
  #beat-ring {
    position: absolute;
    inset: -16px;
    border-radius: 50%;
    pointer-events: none;
  }

  #beat-ring canvas {
    width: 100%; height: 100%;
  }

  /* ===== TRACK INFO ===== */
  #track-info {
    width: 100%;
    padding: 24px 8px 0;
    text-align: center;
    position: relative;
    z-index: 2;
  }

  #track-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(32px, 9vw, 48px);
    letter-spacing: 0.06em;
    line-height: 1;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    filter: drop-shadow(0 0 20px var(--glow));
    transition: color 1.5s ease, filter 1.5s ease;
  }

  #track-artist {
    font-size: 15px;
    font-weight: 300;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-top: 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: color 1.5s ease;
  }

  #track-album {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 4px;
    opacity: 0.5;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ===== PROGRESS BAR ===== */
  #progress-section {
    width: 100%;
    padding: 20px 8px 0;
  }

  #progress-bar-wrap {
    position: relative;
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    cursor: pointer;
    overflow: visible;
  }

  #progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--acc) 0%, var(--acc2) 100%);
    border-radius: 10px;
    transition: width 1s linear, background 1.5s ease;
    position: relative;
  }

  #progress-fill::after {
    content: '';
    position: absolute;
    right: -6px;
    top: 50%;
    transform: translateY(-50%);
    width: 12px; height: 12px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 0 10px var(--acc);
    transition: box-shadow 1.5s ease;
  }

  #progress-glow {
    position: absolute;
    top: -4px;
    left: 0;
    height: 12px;
    background: linear-gradient(90deg, var(--acc) 0%, var(--acc2) 100%);
    border-radius: 10px;
    filter: blur(8px);
    opacity: 0.5;
    pointer-events: none;
    transition: width 1s linear;
  }

  #progress-times {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
    font-size: 11px;
    letter-spacing: 0.06em;
    color: var(--muted);
    opacity: 0.7;
  }

  /* ===== WAVEFORM ===== */
  #waveform-wrap {
    width: 100%;
    padding: 16px 8px 0;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3px;
  }

  .wave-bar {
    flex: 1;
    max-width: 5px;
    border-radius: 10px;
    background: var(--acc);
    transition: background 1.5s ease;
    transform-origin: bottom;
    animation: none;
  }

  /* ===== CONTROLS ===== */
  #controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 20px 8px 0;
    width: 100%;
  }

  .ctrl-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    background: var(--card);
    border-radius: 50%;
    cursor: pointer;
    color: var(--text);
    transition: transform 0.2s var(--transition), background 0.2s ease, box-shadow 0.3s ease;
    -webkit-tap-highlight-color: transparent;
    backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    flex-shrink: 0;
  }

  .ctrl-btn:active { transform: scale(0.88); }

  .ctrl-btn.sm {
    width: 52px; height: 52px;
    font-size: 22px;
  }
  .ctrl-btn.sm:hover { background: rgba(255,255,255,0.1); transform: scale(1.08); }

  .ctrl-btn.lg {
    width: 72px; height: 72px;
    font-size: 28px;
    background: var(--acc);
    border-color: transparent;
    box-shadow: 0 0 30px var(--glow), 0 8px 24px rgba(0,0,0,0.4);
    transition: transform 0.2s var(--transition), background 1.5s ease, box-shadow 1.5s ease;
  }
  .ctrl-btn.lg:hover { transform: scale(1.1); box-shadow: 0 0 50px var(--glow), 0 8px 32px rgba(0,0,0,0.5); }
  .ctrl-btn.lg:active { transform: scale(0.92); }

  /* ===== SEARCH SCREEN ===== */
  #search-screen {
    display: none;
    flex-direction: column;
    width: 100%;
    max-width: 420px;
    gap: 20px;
    animation: fadeUp 0.5s var(--transition) both;
  }

  #search-header {
    text-align: center;
  }

  #search-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    letter-spacing: 0.1em;
    background: linear-gradient(135deg, var(--acc) 0%, var(--acc2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  #search-sub {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
    opacity: 0.7;
  }

  #search-input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }

  #search-input {
    width: 100%;
    padding: 18px 56px 18px 20px;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 100px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    outline: none;
    backdrop-filter: blur(20px);
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
    -webkit-appearance: none;
  }
  #search-input::placeholder { color: var(--muted); opacity: 0.5; }
  #search-input:focus {
    border-color: var(--acc);
    box-shadow: 0 0 0 3px var(--glow);
  }

  #search-icon {
    position: absolute;
    right: 18px;
    font-size: 20px;
    color: var(--muted);
    pointer-events: none;
  }

  #search-results {
    display: flex;
    flex-direction: column;
    gap: 10px;
    overflow-y: auto;
    max-height: calc(100vh - 320px);
    padding-right: 2px;
    scrollbar-width: none;
  }
  #search-results::-webkit-scrollbar { display: none; }

  .search-result {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    cursor: pointer;
    transition: background 0.2s ease, transform 0.2s var(--transition), border-color 0.2s ease;
    animation: fadeUp 0.4s var(--transition) both;
    -webkit-tap-highlight-color: transparent;
    backdrop-filter: blur(10px);
  }
  .search-result:active { transform: scale(0.97); background: rgba(255,255,255,0.08); }
  .search-result:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.15); transform: translateY(-2px); }

  .result-art {
    width: 52px; height: 52px;
    border-radius: 10px;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--c2);
  }

  .result-info { flex: 1; min-width: 0; }

  .result-name {
    font-size: 15px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }

  .result-artist {
    font-size: 12px;
    color: var(--muted);
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .result-dur {
    font-size: 12px;
    color: var(--muted);
    opacity: 0.6;
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
  }

  /* ===== MINI NOW PLAYING BAR ===== */
  #mini-bar {
    display: none;
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: rgba(10,10,26,0.85);
    border: 1px solid var(--border);
    border-radius: 20px;
    backdrop-filter: blur(30px);
    width: calc(100% - 32px);
    max-width: 420px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    transition: transform 0.3s var(--transition);
  }
  #mini-bar:active { transform: translateX(-50%) scale(0.97); }

  #mini-art {
    width: 40px; height: 40px;
    border-radius: 10px;
    object-fit: cover;
    background: var(--c2);
    flex-shrink: 0;
  }

  #mini-info { flex: 1; min-width: 0; }

  #mini-name {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #mini-artist {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  #mini-play-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: none;
    background: var(--acc);
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.2s var(--transition), background 1.5s ease;
  }
  #mini-play-btn:active { transform: scale(0.88); }

  /* ===== TOP BAR ===== */
  #top-bar {
    position: fixed;
    top: 0;
    left: 0; right: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    padding-top: max(14px, env(safe-area-inset-top));
  }

  #logo-small {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 0.1em;
    background: linear-gradient(135deg, var(--acc) 0%, var(--acc2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 10px var(--glow));
    display: none;
  }

  #search-toggle-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-size: 20px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(20px);
    -webkit-tap-highlight-color: transparent;
    transition: background 0.2s ease, transform 0.2s var(--transition);
  }
  #search-toggle-btn:active { transform: scale(0.88); }
  #search-toggle-btn.show { display: flex; }

  /* ===== ANIMATIONS ===== */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes planet-enter {
    from { opacity: 0; transform: scale(0.7); }
    to { opacity: 1; transform: scale(1); }
  }

  @keyframes beat-pulse {
    0% { transform: scale(1); }
    30% { transform: scale(1.06); }
    60% { transform: scale(0.98); }
    100% { transform: scale(1); }
  }

  @keyframes wave-dance {
    0%, 100% { transform: scaleY(0.3); }
    50% { transform: scaleY(1); }
  }

  @keyframes spin-slow {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .planet-beat { animation: beat-pulse 0.5s ease-out; }

  /* ===== LOADING STATES ===== */
  .skeleton {
    background: linear-gradient(90deg, var(--card) 0%, rgba(255,255,255,0.08) 50%, var(--card) 100%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 8px;
  }
  @keyframes shimmer {
    from { background-position: 200% 0; }
    to { background-position: -200% 0; }
  }

  /* ===== RESPONSIVE ===== */
  @media (max-height: 700px) {
    #planet-system { width: 220px; height: 220px; }
    #waveform-wrap { height: 40px; padding-top: 10px; }
    #controls { padding-top: 12px; }
    #track-info { padding-top: 16px; }
  }

  @media (max-height: 600px) {
    #planet-system { width: 180px; height: 180px; }
    #planet-ring { display: none; }
  }

  /* ===== COLOR TRANSITION OVERLAY ===== */
  #color-overlay {
    position: fixed;
    inset: 0;
    z-index: -1;
    opacity: 0;
    transition: background 2s ease, opacity 2s ease;
    pointer-events: none;
  }

  /* ===== SEARCH LOADING ===== */
  #search-loading {
    display: none;
    flex-direction: column;
    gap: 10px;
  }

  .search-skel {
    height: 80px;
    border-radius: 16px;
  }

  /* ===== NO RESULTS ===== */
  #no-results {
    display: none;
    text-align: center;
    padding: 32px 0;
    color: var(--muted);
    font-size: 15px;
    opacity: 0.7;
  }
</style>
</head>
<body>

<!-- Cosmos canvas background -->
<canvas id="cosmos-canvas"></canvas>

<!-- Shockwave effects layer -->
<div id="shockwave-layer"></div>

<!-- Color overlay for adaptive theming -->
<div id="color-overlay"></div>

<!-- Top navigation bar -->
<div id="top-bar">
  <div id="logo-small">COSMO</div>
  <button id="search-toggle-btn" aria-label="Search">🔍</button>
</div>

<!-- Main app -->
<div id="app">

  <!-- AUTH SCREEN -->
  <div id="auth-screen">
    <div>
      <div class="logo-mark">COSMO</div>
      <div class="logo-sub">Your Music Universe</div>
    </div>
    <p class="auth-tagline">Your music, alive in the cosmos. Every track becomes a world.</p>
    <button class="btn-spotify" id="spotify-auth-btn">
      <svg class="spotify-icon" viewBox="0 0 24 24" fill="currentColor">

// ============================================================
//  COSMOS CANVAS — Particle nebula system
// ============================================================

const ctx = cosmosCanvas.getContext('2d');
let particles = [];
let W, H;

function resizeCanvas() {
  W = cosmosCanvas.width = window.innerWidth;
  H = cosmosCanvas.height = window.innerHeight;
}

function createParticles() {
  particles = [];
  const count = Math.min(Math.floor((W * H) / 4000), 180);
  for (let i = 0; i < count; i++) {
    particles.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.8 + 0.3,
      vx: (Math.random() - 0.5) * 0.12,
      vy: (Math.random() - 0.5) * 0.12,
      opacity: Math.random() * 0.7 + 0.1,
      twinkleSpeed: Math.random() * 0.02 + 0.005,
      twinkleOffset: Math.random() * Math.PI * 2,
      hue: Math.random() * 60 - 30,
      size: Math.random(),
    });
  }
}

// Nebula clouds
const nebulae = [];
function createNebulae() {
  for (let i = 0; i < 5; i++) {
    nebulae.push({
      x: Math.random() * 0.9 + 0.05,
      y: Math.random() * 0.9 + 0.05,
      rx: Math.random() * 0.25 + 0.1,
      ry: Math.random() * 0.15 + 0.06,
      opacity: Math.random() * 0.04 + 0.01,
      drift: Math.random() * 0.0001,
      driftOffset: Math.random() * Math.PI * 2,
    });
  }
}

let cosmosTime = 0;
let beatFlashAlpha = 0;

function drawCosmos() {
  cosmosTime++;
  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = `rgb(6, 9, 26)`;
  ctx.fillRect(0, 0, W, H);

  // Nebulae (color-adaptive)
  const [r, g, b] = dominantColor;
  nebulae.forEach((n, i) => {
    const drift = Math.sin(cosmosTime * n.drift + n.driftOffset) * 30;
    const grd = ctx.createRadialGradient(
      n.x * W + drift, n.y * H, 0,
      n.x * W + drift, n.y * H, n.rx * W
    );
    grd.addColorStop(0, `rgba(${r},${g},${b},${n.opacity * 2})`);
    grd.addColorStop(0.4, `rgba(${r},${g},${b},${n.opacity})`);
    grd.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.ellipse(n.x * W + drift, n.y * H, n.rx * W, n.ry * H, i * 0.4, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();
  });

  // Beat flash
  if (beatFlashAlpha > 0) {
    const radGrd = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H) * 0.7);
    radGrd.addColorStop(0, `rgba(${r},${g},${b},${beatFlashAlpha * 0.15})`);
    radGrd.addColorStop(1, 'transparent');
    ctx.fillStyle = radGrd;
    ctx.fillRect(0, 0, W, H);
    beatFlashAlpha *= 0.88;
  }

  // Stars / particles
  particles.forEach(p => {
    const twinkle = Math.sin(cosmosTime * p.twinkleSpeed + p.twinkleOffset);
    const op = p.opacity * (0.6 + twinkle * 0.4);
    const pr = p.r * (0.8 + twinkle * 0.2);

    // Color-tinted stars near center
    const dx = p.x - W/2, dy = p.y - H/2;
    const dist = Math.sqrt(dx*dx + dy*dy) / Math.max(W,H);
    const tint = Math.max(0, 1 - dist * 2.5);

    const sr = Math.round(220 + (r - 220) * tint);
    const sg = Math.round(220 + (g - 220) * tint);
    const sb = Math.round(220 + (b - 220) * tint);

    ctx.beginPath();
    ctx.arc(p.x, p.y, pr, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${sr},${sg},${sb},${op})`;
    ctx.fill();

    // Star glow for larger ones
    if (p.size > 0.85) {
      const grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, pr * 5);
      grd.addColorStop(0, `rgba(${sr},${sg},${sb},${op * 0.4})`);
      grd.addColorStop(1, 'transparent');
      ctx.beginPath();
      ctx.arc(p.x, p.y, pr * 5, 0, Math.PI * 2);
      ctx.fillStyle = grd;
      ctx.fill();
    }

    // Drift
    p.x += p.vx;
    p.y += p.vy;
    if (p.x < -10) p.x = W + 10;
    if (p.x > W + 10) p.x = -10;
    if (p.y < -10) p.y = H + 10;
    if (p.y > H + 10) p.y = -10;
  });

  cosmosAnimId = requestAnimationFrame(drawCosmos);
}

// ============================================================
//  WAVEFORM BARS — Dynamic animated equalizer
// ============================================================

function buildWaveform() {
  waveformWrap.innerHTML = '';
  const count = Math.min(Math.floor(waveformWrap.clientWidth / 8), 48);
  for (let i = 0; i < count; i++) {
    const bar = document.createElement('div');
    bar.className = 'wave-bar';
    const delay = (i / count) * 1.2;
    const duration = 0.4 + Math.random() * 0.6;
    bar.style.cssText = `
      animation: wave-dance ${duration}s ${delay}s ease-in-out infinite;
      opacity: ${0.4 + Math.random() * 0.6};
    `;
    waveformWrap.appendChild(bar);
  }
}

function pauseWaveform() {
  document.querySelectorAll('.wave-bar').forEach(b => {
    b.style.animationPlayState = 'paused';
    b.style.transform = 'scaleY(0.15)';
    b.style.transition = 'transform 0.5s ease';
  });
}

function resumeWaveform() {
  document.querySelectorAll('.wave-bar').forEach(b => {
    b.style.animationPlayState = 'running';
    b.style.transform = '';
    b.style.transition = '';
  });
}

function updateWaveformColor() {
  const [r, g, b] = dominantColor;
  document.querySelectorAll('.wave-bar').forEach(bar => {
    bar.style.background = `rgb(${r},${g},${b})`;
  });
}

// ============================================================
//  COLOR EXTRACTION — From album art
// ============================================================

function extractColors(imgEl) {
  return new Promise(resolve => {
    try {
      const cv = document.createElement('canvas');
      cv.width = cv.height = 64;
      const c = cv.getContext('2d');
      c.drawImage(imgEl, 0, 0, 64, 64);
      const data = c.getImageData(0, 0, 64, 64).data;

      // Sample colors and find dominant vivid ones
      const buckets = {};
      for (let i = 0; i < data.length; i += 16) {
        const r = Math.round(data[i] / 32) * 32;
        const g = Math.round(data[i+1] / 32) * 32;
        const b = Math.round(data[i+2] / 32) * 32;
        const key = `${r},${g},${b}`;
        buckets[key] = (buckets[key] || 0) + 1;
      }

      // Sort by frequency, skip near-black/white
      const sorted = Object.entries(buckets)
        .filter(([k]) => {
          const [r,g,b] = k.split(',').map(Number);
          const bright = (r+g+b)/3;
          const sat = Math.max(r,g,b) - Math.min(r,g,b);
          return bright > 30 && bright < 220 && sat > 40;
        })
        .sort((a,b) => b[1]-a[1]);

      if (sorted.length >= 2) {
        dominantColor = sorted[0][0].split(',').map(Number);
        accentColor = sorted[Math.min(1, sorted.length-1)][0].split(',').map(Number);
      } else if (sorted.length === 1) {
        dominantColor = sorted[0][0].split(',').map(Number);
        accentColor = [Math.round(dominantColor[2]), Math.round(dominantColor[0]), Math.round(dominantColor[1])];
      }

      resolve();
    } catch(e) {
      // CORS error — use defaults
      dominantColor = [127, 119, 221];
      accentColor = [93, 202, 165];
      resolve();
    }
  });
}

function applyAdaptiveColors() {
  const [r,g,b] = dominantColor;
  const [r2,g2,b2] = accentColor;

  const acc = `rgb(${r},${g},${b})`;
  const acc2 = `rgb(${r2},${g2},${b2})`;
  const glow = `rgba(${r},${g},${b},0.35)`;
  const glow2 = `rgba(${r},${g},${b},0.15)`;

  document.documentElement.style.setProperty('--acc', acc);
  document.documentElement.style.setProperty('--acc2', acc2);
  document.documentElement.style.setProperty('--glow', glow);

  // Adaptive background — very subtle tint
  colorOverlay.style.background = `radial-gradient(ellipse at 50% 40%, rgba(${r},${g},${b},0.12) 0%, transparent 70%)`;
  colorOverlay.style.opacity = '1';

  // Play button
  btnPlay.style.background = acc;
  btnPlay.style.boxShadow = `0 0 30px ${glow}, 0 8px 24px rgba(0,0,0,0.4)`;
  miniPlayBtn.style.background = acc;

  // Planet ring
  planetRing.style.borderColor = `rgba(${r},${g},${b},0.7)`;
  planetRing.style.boxShadow = `0 0 24px ${glow}, 0 0 60px ${glow2}`;

  // Moon
  moon.style.background = `radial-gradient(circle at 35% 35%, #fff 0%, rgb(${r2},${g2},${b2}) 40%, rgb(${Math.round(r2*0.3)},${Math.round(g2*0.3)},${Math.round(b2*0.3)}) 100%)`;
  moon.style.boxShadow = `0 0 20px ${acc2}, 0 0 6px #fff inset`;

  // Track name glow
  trackName.style.filter = `drop-shadow(0 0 20px ${glow})`;

  updateWaveformColor();
}

// ============================================================
//  BEAT EFFECTS
// ============================================================

function triggerBeat() {
  const now = Date.now();
  if (now - lastBeatTime < 200) return; // debounce
  lastBeatTime = now;

  // Beat flash on canvas
  beatFlashAlpha = 1;

  // Planet pulse
  planetWrap.classList.remove('planet-beat');
  void planetWrap.offsetWidth;
  planetWrap.classList.add('planet-beat');
  setTimeout(() => planetWrap.classList.remove('planet-beat'), 600);

  // Shockwave ring
  triggerShockwave(window.innerWidth/2, window.innerHeight * 0.35);
}

function triggerBeatDrop() {
  // EPIC beat drop — multiple shockwaves + supernova
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight * 0.35;

  for (let i = 0; i < 4; i++) {
    setTimeout(() => {
      triggerShockwave(cx, cy, true);
    }, i * 120);
  }

  // Supernova burst
  const sn = document.createElement('div');
  sn.className = 'supernova';
  sn.style.left = cx + 'px';
  sn.style.top = cy + 'px';
  sn.style.width = '200px';
  sn.style.height = '200px';
  sn.style.setProperty('--acc', `rgb(${dominantColor.join(',')})`);
  shockwaveLayer.appendChild(sn);
  setTimeout(() => sn.remove(), 1000);

  // Intense flash
  beatFlashAlpha = 2;
}

function triggerShockwave(x, y, large = false) {
  const el = document.createElement('div');
  el.className = 'shockwave';
  const size = large ? 300 : 200;
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  el.style.width = size + 'px';
  el.style.height = size + 'px';
  el.style.borderColor = `rgb(${dominantColor.join(',')})`;
  el.style.boxShadow = `0 0 20px rgba(${dominantColor.join(',')},0.5)`;
  shockwaveLayer.appendChild(el);
  setTimeout(() => el.remove(), 1300);
}

function startBeatEngine(estimatedBpm) {
  bpm = estimatedBpm || 120;
  if (beatInterval) clearInterval(beatInterval);

  const interval = (60 / bpm) * 1000;

  // Update orbit speed
  const orbitDuration = Math.max(3, Math.round(60 / bpm * 4));
  planetOrbit.style.animationDuration = orbitDuration + 's';

  let beatCount = 0;
  beatInterval = setInterval(() => {
    if (!isPlaying) return;
    beatCount++;
    triggerBeat();

    // Every 8 beats = "bar" — possible beat drop visual
    if (beatCount % 16 === 0) {
      triggerBeatDrop();
    }
  }, interval);
}

function stopBeatEngine() {
  if (beatInterval) { clearInterval(beatInterval); beatInterval = null; }
}

// ============================================================
//  SPOTIFY AUTH — PKCE Flow
// ============================================================

function generateCodeVerifier(length) {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
  let result = '';
  const arr = new Uint8Array(length);
  crypto.getRandomValues(arr);
  arr.forEach(v => result += chars[v % chars.length]);
  return result;
}

async function generateCodeChallenge(verifier) {
  const data = new TextEncoder().encode(verifier);
  const hash = await crypto.subtle.digest('SHA-256', data);
  return btoa(String.fromCharCode(...new Uint8Array(hash)))
    .replace(/=/g, '').replace(/\+/g, '-').replace(/\//g, '_');
}

async function initiateAuth() {
  const verifier = generateCodeVerifier(64);
  const challenge = await generateCodeChallenge(verifier);
  sessionStorage.setItem('pkce_verifier', verifier);

  const params = new URLSearchParams({
    response_type: 'code',
    client_id: SPOTIFY_CLIENT_ID,
    scope: SCOPES,
    redirect_uri: REDIRECT_URI,
    code_challenge_method: 'S256',
    code_challenge: challenge,
  });

  window.location.href = `https://accounts.spotify.com/authorize?${params}`;
}

async function exchangeCode(code) {
  const verifier = sessionStorage.getItem('pkce_verifier');
  if (!verifier) throw new Error('No PKCE verifier');

  const res = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      grant_type: 'authorization_code',
      code,
      redirect_uri: REDIRECT_URI,
      client_id: SPOTIFY_CLIENT_ID,
      code_verifier: verifier,
    })
  });

  if (!res.ok) throw new Error('Token exchange failed');
  const data = await res.json();
  accessToken = data.access_token;

  // Store with expiry
  const expiry = Date.now() + data.expires_in * 1000;
  localStorage.setItem('cosmo_token', accessToken);
  localStorage.setItem('cosmo_token_expiry', expiry);
  localStorage.setItem('cosmo_refresh_token', data.refresh_token || '');

  // Clean URL
  window.history.replaceState({}, '', window.location.pathname);
  sessionStorage.removeItem('pkce_verifier');
}

async function refreshAccessToken() {
  const rt = localStorage.getItem('cosmo_refresh_token');
  if (!rt) return false;

  try {
    const res = await fetch('https://accounts.spotify.com/api/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        grant_type: 'refresh_token',
        refresh_token: rt,
        client_id: SPOTIFY_CLIENT_ID,
      })
    });
    if (!res.ok) return false;
    const data = await res.json();
    accessToken = data.access_token;
    const expiry = Date.now() + data.expires_in * 1000;
    localStorage.setItem('cosmo_token', accessToken);
    localStorage.setItem('cosmo_token_expiry', expiry);
    if (data.refresh_token) localStorage.setItem('cosmo_refresh_token', data.refresh_token);
    return true;
  } catch { return false; }
}

async function getValidToken() {
  const stored = localStorage.getItem('cosmo_token');
  const expiry = parseInt(localStorage.getItem('cosmo_token_expiry') || '0');

  if (stored && Date.now() < expiry - 60000) {
    accessToken = stored;
    return true;
  }

  return await refreshAccessToken();
}

// ============================================================
//  SPOTIFY API
// ============================================================

async function spotifyFetch(endpoint, options = {}) {
  if (!accessToken) return null;
  const res = await fetch(`https://api.spotify.com/v1${endpoint}`, {
    ...options,
    headers: {
      'Authorization': `Bearer ${accessToken}`,
      'Content-Type': 'application/json',
      ...options.headers,
    }
  });

  if (res.status === 401) {
    const ok = await refreshAccessToken();
    if (ok) return spotifyFetch(endpoint, options);
    logout();
    return null;
  }

  if (res.status === 204 || res.status === 202) return null;
  if (!res.ok) return null;

  try { return await res.json(); } catch { return null; }
}

async function fetchCurrentTrack() {
  const data = await spotifyFetch('/me/player/currently-playing?additional_types=track');
  return data;
}

async function fetchRecentlyPlayed() {
  const data = await spotifyFetch('/me/player/recently-played?limit=1');
  return data?.items?.[0]?.track || null;
}

async function playTrack(uri) {
  await spotifyFetch('/me/player/play', {
    method: 'PUT',
    body: JSON.stringify({ uris: [uri] })
  });
  setTimeout(() => pollNow(), 800);
}

async function togglePlayPause() {
  if (isPlaying) {
    await spotifyFetch('/me/player/pause', { method: 'PUT' });
    isPlaying = false;
    updatePlayUI();
    stopBeatEngine();
    pauseWaveform();
  } else {
    await spotifyFetch('/me/player/play', { method: 'PUT' });
    isPlaying = true;
    updatePlayUI();
    startBeatEngine(bpm);
    resumeWaveform();
  }
}

async function skipNext() {
  await spotifyFetch('/me/player/next', { method: 'POST' });
  setTimeout(() => pollNow(), 600);
}

async function skipPrev() {
  await spotifyFetch('/me/player/previous', { method: 'POST' });
  setTimeout(() => pollNow(), 600);
}

async function searchTracks(query) {
  if (!query.trim()) return [];
  const data = await spotifyFetch(`/search?q=${encodeURIComponent(query)}&type=track&limit=12`);
  return data?.tracks?.items || [];
}

// ============================================================
//  TRACK UPDATE — UI rendering
// ============================================================

async function updateTrackUI(track, playing, progressMs) {
  if (!track) return;

  const isNew = !currentTrack || currentTrack.id !== track.id;
  currentTrack = track;
  isPlaying = playing;
  currentProgressMs = progressMs || 0;
  currentDurationMs = track.duration_ms;

  // Track info
  trackName.textContent = track.name;
  trackArtist.textContent = track.artists?.map(a => a.name).join(', ') || '—';
  trackAlbum.textContent = track.album?.name || '—';
  miniName.textContent = track.name;
  miniArtist.textContent = track.artists?.[0]?.name || '—';

  // Album art
  const artUrl = track.album?.images?.[0]?.url;
  if (artUrl && artUrl !== planetArt.src) {
    planetArt.style.opacity = '0';
    planetArt.onload = async () => {
      await extractColors(planetArt);
      applyAdaptiveColors();
      planetArt.style.opacity = '1';

      if (isNew) {
        // Planet entrance animation
        planetWrap.style.animation = 'planet-enter 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both';
        setTimeout(() => planetWrap.style.animation = '', 900);
        triggerBeatDrop();
      }
    };
    planetArt.src = artUrl;
    miniArt.src = artUrl;
  }

  updatePlayUI();
  updateProgress();

  // Estimate BPM from track name/energy heuristic (real BPM requires Spotify Audio Features)
  if (isNew) {
    const audioFeats = await spotifyFetch(`/audio-features/${track.id}`);
    if (audioFeats?.tempo) {
      bpm = audioFeats.tempo;
    }
    if (playing) startBeatEngine(bpm);
  }
}

function updatePlayUI() {
  btnPlay.textContent = isPlaying ? '⏸' : '▶';
  miniPlayBtn.textContent = isPlaying ? '⏸' : '▶';
  if (isPlaying) {
    resumeWaveform();
  } else {
    pauseWaveform();
    stopBeatEngine();
  }
}

function updateProgress() {
  if (!currentDurationMs) return;
  const pct = Math.min(100, (currentProgressMs / currentDurationMs) * 100);
  progressFill.style.width = pct + '%';
  progressGlow.style.width = pct + '%';
  timeCurrent.textContent = formatTime(currentProgressMs);
  timeTotal.textContent = formatTime(currentDurationMs);
}

function formatTime(ms) {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

// Progress ticker
function startProgressTicker() {
  if (progressInterval) clearInterval(progressInterval);
  progressInterval = setInterval(() => {
    if (isPlaying) {
      currentProgressMs = Math.min(currentProgressMs + 1000, currentDurationMs);
      updateProgress();
    }
  }, 1000);
}

// ============================================================
//  POLLING LOOP
// ============================================================

async function pollNow() {
  const data = await fetchCurrentTrack();

  if (data?.is_playing && data?.item) {
    await updateTrackUI(data.item, data.is_playing, data.progress_ms);
    showPlayerScreen();
  } else if (data?.item) {
    // Paused with a track
    await updateTrackUI(data.item, false, data.progress_ms);
    showPlayerScreen();
  } else {
    // Nothing playing — check recently played
    const recent = await fetchRecentlyPlayed();
    if (recent) {
      await updateTrackUI(recent, false, 0);
      showPlayerScreen();
    }
    // Show search
    if (!inSearchMode) showSearchMode();
  }
}

function startPolling() {
  pollNow();
  pollInterval = setInterval(pollNow, 10000);
}

// ============================================================
//  SCREEN MANAGEMENT
// ============================================================

function showPlayerScreen() {
  authScreen.style.display = 'none';
  searchScreen.style.display = 'none';
  playerScreen.style.display = 'flex';
  miniBar.style.display = 'none';
  logoSmall.style.display = 'none';
  searchToggleBtn.classList.add('show');
  inSearchMode = false;

  if (!waveformWrap.children.length) buildWaveform();
}

function showSearchMode() {
  inSearchMode = true;
  playerScreen.style.display = 'none';
  searchScreen.style.display = 'flex';
  logoSmall.style.display = 'block';
  searchToggleBtn.textContent = currentTrack ? '🌌' : '🔍';

  if (currentTrack) {
    miniBar.style.display = 'flex';
  }
}

function toggleSearchMode() {
  if (inSearchMode) {
    showPlayerScreen();
  } else {
    showSearchMode();
  }
}

function logout() {
  localStorage.clear();
  accessToken = null;
  currentTrack = null;
  if (pollInterval) clearInterval(pollInterval);
  if (progressInterval) clearInterval(progressInterval);
  stopBeatEngine();
  authScreen.style.display = 'flex';
  playerScreen.style.display = 'none';
  searchScreen.style.display = 'none';
  miniBar.style.display = 'none';
  logoSmall.style.display = 'none';
  searchToggleBtn.classList.remove('show');
}

// ============================================================
//  SEARCH
// ============================================================

let searchDebounce = null;

searchInput.addEventListener('input', () => {
  clearTimeout(searchDebounce);
  const q = searchInput.value.trim();

  if (!q) {
    searchResults.innerHTML = '';
    searchLoading.style.display = 'none';
    noResults.style.display = 'none';
    return;
  }

  searchLoading.style.display = 'flex';
  searchResults.innerHTML = '';
  noResults.style.display = 'none';

  searchDebounce = setTimeout(async () => {
    const tracks = await searchTracks(q);
    searchLoading.style.display = 'none';

    if (!tracks.length) {
      noResults.style.display = 'block';
      return;
    }

    searchResults.innerHTML = '';
    tracks.forEach((t, i) => {
      const el = document.createElement('div');
      el.className = 'search-result';
      el.style.animationDelay = (i * 0.05) + 's';

      const art = t.album?.images?.[1]?.url || t.album?.images?.[0]?.url || '';
      const dur = formatTime(t.duration_ms);
      const artist = t.artists?.map(a => a.name).join(', ') || '—';

      el.innerHTML = `
        <img class="result-art" src="${art}" alt="" loading="lazy" onerror="this.style.background='var(--c2)'">
        <div class="result-info">
          <div class="result-name">${escHtml(t.name)}</div>
          <div class="result-artist">${escHtml(artist)}</div>
        </div>
        <div class="result-dur">${dur}</div>
      `;

      el.addEventListener('click', async () => {
        await playTrack(t.uri);
        showPlayerScreen();
        searchInput.value = '';
      });

      searchResults.appendChild(el);
    });
  }, 380);
});

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ============================================================
//  EVENT LISTENERS
// ============================================================

spotifyAuthBtn.addEventListener('click', initiateAuth);
btnPlay.addEventListener('click', togglePlayPause);
btnPrev.addEventListener('click', skipPrev);
btnNext.addEventListener('click', skipNext);
miniPlayBtn.addEventListener('click', (e) => { e.stopPropagation(); togglePlayPause(); });
miniBar.addEventListener('click', showPlayerScreen);
searchToggleBtn.addEventListener('click', toggleSearchMode);

// Touch-friendly tap on search toggle for mobile
searchToggleBtn.addEventListener('touchend', (e) => {
  e.preventDefault();
  toggleSearchMode();
}, { passive: false });

// ============================================================
//  BOOT SEQUENCE
// ============================================================

async function boot() {
  // Init canvas
  resizeCanvas();
  createParticles();
  createNebulae();
  drawCosmos();
  window.addEventListener('resize', () => {
    resizeCanvas();
    createParticles();
    buildWaveform();
  });

  // Check for OAuth callback
  const urlParams = new URLSearchParams(window.location.search);
  const code = urlParams.get('code');
  const error = urlParams.get('error');

  if (error) {
    window.history.replaceState({}, '', window.location.pathname);
    return;
  }

  if (code) {
    try {
      await exchangeCode(code);
      showPlayerScreen();
      startPolling();
      startProgressTicker();
      return;
    } catch(e) {
      console.error('Auth failed', e);
    }
  }

  // Check stored token
  const hasToken = await getValidToken();
  if (hasToken) {
    showPlayerScreen();
    startPolling();
    startProgressTicker();
  }
  // Otherwise show auth screen (already visible)
}

boot();
</script>
